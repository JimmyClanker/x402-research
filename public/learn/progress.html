<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progressi - English B1→C1</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface-2: #242838;
      --border: #2e3348;
      --text: #e2e4eb;
      --text-muted: #8b8fa3;
      --accent: #6c8cff;
      --accent-hover: #8da6ff;
      --success: #4ade80;
      --success-bg: rgba(74,222,128,0.08);
      --warning: #fbbf24;
      --warning-bg: rgba(251,191,36,0.08);
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.08);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    header {
      background: var(--surface);
      padding: 18px 24px;
      margin-bottom: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-flex;
      transition: all 0.2s;
    }

    .back-btn:hover { background: var(--border); }

    h1 {
      color: #fff;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h2 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }

    .card {
      background: var(--surface);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    /* Quiz scores grid */
    .quiz-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-row {
      background: var(--surface-2);
      padding: 14px 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .quiz-name {
      flex: 1;
      font-size: 0.92rem;
      color: var(--text);
      font-weight: 500;
    }

    .quiz-badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      min-width: 48px;
      text-align: center;
    }

    .quiz-badge.high { background: var(--success-bg); color: var(--success); }
    .quiz-badge.mid { background: var(--warning-bg); color: var(--warning); }
    .quiz-badge.low { background: var(--error-bg); color: var(--error); }
    .quiz-badge.none { background: var(--surface); color: var(--text-muted); }

    /* Progress bar */
    .progress-bar {
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Recent attempts */
    .attempt-row {
      background: var(--surface-2);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .attempt-name {
      font-size: 0.9rem;
      color: var(--text);
    }

    .attempt-score {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 600;
    }

    .attempt-date {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      h1 { font-size: 1.15rem; }
      .container { padding: 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="back-btn" href="/learn">←</a>
      <h1>📊 I Tuoi Progressi</h1>
    </header>

    <div id="content">
      <div class="loading">Caricamento progressi...</div>
    </div>
  </div>

  <script>
    async function load() {
      try {
        const res = await fetch('/learn/api/progress');
        if (!res.ok) {
          if (res.status === 401) { window.location.href = '/learn'; return; }
          throw new Error('Failed');
        }
        render(await res.json());
      } catch (err) {
        document.getElementById('content').innerHTML =
          '<div class="empty-state">Errore nel caricamento dei progressi</div>';
      }
    }

    function render(data) {
      const el = document.getElementById('content');
      const o = data.overall || {};
      const quizzes = data.quizScores || [];
      const recent = data.recentAttempts || [];

      const attempted = quizzes.filter(q => q.attempted).length;
      const total = quizzes.length;
      const pct = total > 0 ? Math.round((attempted / total) * 100) : 0;

      let quizHtml = '';
      quizzes.forEach(q => {
        let cls = 'none';
        let label = '—';
        if (q.attempted) {
          if (q.percentage >= 70) { cls = 'high'; label = q.percentage + '%'; }
          else if (q.percentage >= 50) { cls = 'mid'; label = q.percentage + '%'; }
          else { cls = 'low'; label = q.percentage + '%'; }
        }
        quizHtml += '<div class="quiz-row">' +
          '<div class="quiz-name">' + q.name + '</div>' +
          '<div class="quiz-badge ' + cls + '">' + label + '</div></div>';
      });

      let recentHtml = '';
      if (recent.length === 0) {
        recentHtml = '<div class="empty-state">Nessun tentativo ancora</div>';
      } else {
        recent.forEach(a => {
          const date = new Date(a.created_at).toLocaleDateString('it-IT', {
            day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
          });
          recentHtml += '<div class="attempt-row">' +
            '<div><div class="attempt-name">' + (a.quizName || 'Quiz') + '</div>' +
            '<div class="attempt-date">' + date + '</div></div>' +
            '<div class="attempt-score">' + a.score + '/' + a.max_score + ' (' + a.percentage + '%)</div></div>';
        });
      }

      el.innerHTML =
        '<div class="card">' +
          '<h2>Panoramica</h2>' +
          '<p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:8px;">' +
            attempted + ' di ' + total + ' quiz completati (' + pct + '%)' +
          '</p>' +
          '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="card"><h2>Quiz per Modulo</h2><div class="quiz-grid">' + quizHtml + '</div></div>' +
        '<div class="card"><h2>Ultimi Tentativi</h2>' + recentHtml + '</div>';
    }

    load();
  </script>
</body>
</html>
