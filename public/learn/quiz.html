<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - English B1→C1</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface-2: #242838;
      --border: #2e3348;
      --text: #e2e4eb;
      --text-muted: #8b8fa3;
      --accent: #6c8cff;
      --accent-hover: #8da6ff;
      --success: #4ade80;
      --success-bg: rgba(74,222,128,0.08);
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.08);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    header {
      background: var(--surface);
      padding: 18px 24px;
      margin-bottom: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
    }

    .back-btn:hover { background: var(--border); }

    h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      flex: 1;
      letter-spacing: -0.02em;
    }

    /* Quiz info bar */
    .quiz-info {
      background: var(--surface);
      padding: 16px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .quiz-stat { text-align: center; }
    .quiz-stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }
    .quiz-stat-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Questions */
    .question-card {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .question-number {
      background: var(--accent);
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .question-type {
      color: var(--text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .question-text {
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
      white-space: pre-wrap;
      line-height: 1.7;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option {
      background: var(--surface-2);
      padding: 13px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option:hover {
      border-color: var(--accent);
      background: rgba(108,140,255,0.06);
    }

    .option.selected {
      border-color: var(--accent);
      background: rgba(108,140,255,0.12);
    }

    .option input[type="radio"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .option label {
      flex: 1;
      cursor: pointer;
      color: var(--text);
      font-size: 0.95rem;
    }

    .text-answer {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .text-answer:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Submit */
    .submit-section {
      text-align: center;
      margin-top: 32px;
      padding-bottom: 20px;
    }

    .btn-submit {
      padding: 14px 48px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--accent);
      color: #fff;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      background: var(--surface-2);
      cursor: not-allowed;
      opacity: 0.5;
    }

    /* Results */
    .results {
      background: var(--surface);
      padding: 28px 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-top: 24px;
    }

    .results-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .results-score {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .results-message {
      font-size: 1.1rem;
      color: var(--text);
    }

    .result-item {
      background: var(--surface-2);
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 3px solid transparent;
    }

    .result-item.correct {
      border-left-color: var(--success);
      background: var(--success-bg);
    }

    .result-item.incorrect {
      border-left-color: var(--error);
      background: var(--error-bg);
    }

    .result-question {
      color: #fff;
      margin-bottom: 6px;
      font-size: 0.92rem;
    }

    .result-answer {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 3px;
    }

    .result-answer.correct-answer {
      color: var(--success);
      font-weight: 500;
    }

    .btn-back {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-back:hover { background: var(--accent-hover); }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .error {
      background: var(--error-bg);
      color: var(--error);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(248,113,113,0.2);
    }

    @media (max-width: 768px) {
      h1 { font-size: 1.1rem; }
      .question-card { padding: 18px 16px; }
      .results-score { font-size: 2rem; }
      .container { padding: 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="back-btn" href="/learn">←</a>
      <h1 id="quizTitle">Caricamento...</h1>
    </header>

    <div id="content">
      <div class="loading">Caricamento quiz...</div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('id');
    let currentQuiz = null;
    let answers = {};

    if (!quizId) {
      document.getElementById('content').innerHTML = '<div class="error">Nessun quiz specificato</div>';
    } else {
      loadQuiz();
    }

    async function loadQuiz() {
      try {
        const res = await fetch('/learn/api/quiz/' + quizId);
        if (!res.ok) {
          if (res.status === 401) { window.location.href = '/learn'; return; }
          throw new Error('Failed');
        }
        currentQuiz = await res.json();
        document.getElementById('quizTitle').textContent = currentQuiz.name;
        renderQuiz();
      } catch (err) {
        document.getElementById('content').innerHTML = '<div class="error">Errore nel caricamento del quiz</div>';
      }
    }

    function escapeAttr(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;');
    }

    function renderQuiz() {
      const c = document.getElementById('content');

      const infoHtml = '<div class="quiz-info">' +
        '<div class="quiz-stat"><div class="quiz-stat-value">' + currentQuiz.questions.length + '</div><div class="quiz-stat-label">Domande</div></div>' +
        '<div class="quiz-stat"><div class="quiz-stat-value">' + currentQuiz.grade + '</div><div class="quiz-stat-label">Punti</div></div>' +
        '</div>';

      let questionsHtml = '';
      currentQuiz.questions.forEach((q, idx) => {
        if (q.type === 'multichoice') {
          let optsHtml = '';
          q.options.forEach((opt, oi) => {
            const eid = 'q' + q.slot + '_' + oi;
            optsHtml += '<div class="option" data-slot="' + q.slot + '" data-idx="' + oi + '">' +
              '<input type="radio" name="q' + q.slot + '" id="' + eid + '" value="' + oi + '">' +
              '<label for="' + eid + '">' + escapeAttr(opt) + '</label></div>';
          });
          questionsHtml += '<div class="question-card">' +
            '<div class="question-header"><span class="question-number">Domanda ' + (idx+1) + '</span>' +
            '<span class="question-type">Scelta multipla</span></div>' +
            '<div class="question-text">' + q.text + '</div>' +
            '<div class="options">' + optsHtml + '</div></div>';
        } else {
          questionsHtml += '<div class="question-card">' +
            '<div class="question-header"><span class="question-number">Domanda ' + (idx+1) + '</span>' +
            '<span class="question-type">Risposta aperta</span></div>' +
            '<div class="question-text">' + q.text + '</div>' +
            '<input type="text" class="text-answer" id="answer_' + q.slot + '" ' +
            'placeholder="Scrivi la tua risposta..." data-slot="' + q.slot + '"></div>';
        }
      });

      c.innerHTML = infoHtml +
        '<form id="quizForm">' + questionsHtml +
        '<div class="submit-section"><button type="submit" class="btn-submit">Invia Quiz</button></div>' +
        '</form><div id="results" style="display:none;"></div>';

      // Click handlers for options
      document.querySelectorAll('.option').forEach(el => {
        el.addEventListener('click', function() {
          const slot = this.dataset.slot;
          const idx = parseInt(this.dataset.idx);
          answers[slot] = idx;
          const radio = this.querySelector('input[type="radio"]');
          if (radio) radio.checked = true;
          // Visual feedback
          this.parentElement.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
          this.classList.add('selected');
        });
      });

      // Text answer handlers
      document.querySelectorAll('.text-answer').forEach(el => {
        el.addEventListener('input', function() {
          answers[this.dataset.slot] = this.value;
        });
      });

      document.getElementById('quizForm').addEventListener('submit', submitQuiz);
    }

    async function submitQuiz(e) {
      e.preventDefault();
      const unanswered = currentQuiz.questions.filter(q => answers[q.slot] === undefined || answers[q.slot] === '');
      if (unanswered.length > 0) {
        alert('Rispondi a tutte le domande. Ne mancano ' + unanswered.length + '.');
        return;
      }
      try {
        const res = await fetch('/learn/api/quiz/' + quizId + '/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ answers }),
        });
        if (!res.ok) throw new Error('Submit failed');
        showResults(await res.json());
      } catch (err) {
        alert('Errore nell\'invio. Riprova.');
      }
    }

    function showResults(results) {
      document.getElementById('quizForm').style.display = 'none';
      const pct = results.percentage;
      let msg = 'Continua a studiare! 📚';
      if (pct >= 90) msg = 'Eccellente! 🌟';
      else if (pct >= 70) msg = 'Ottimo lavoro! 👍';
      else if (pct >= 50) msg = 'Buon inizio, migliora! 💪';

      let itemsHtml = '';
      results.results.forEach((r, idx) => {
        const q = currentQuiz.questions.find(q => q.slot === r.slot);
        const cls = r.correct ? 'correct' : 'incorrect';
        let userDisplay = r.userAnswer;
        if (q.type === 'multichoice' && typeof r.userAnswer === 'number' && q.options[r.userAnswer]) {
          userDisplay = q.options[r.userAnswer];
        }
        itemsHtml += '<div class="result-item ' + cls + '">' +
          '<div class="result-question"><strong>D' + (idx+1) + ':</strong> ' +
          (q.text.length > 120 ? q.text.substring(0,120) + '…' : q.text) + '</div>' +
          '<div class="result-answer">La tua risposta: ' + (userDisplay || '(vuota)') + '</div>' +
          (!r.correct ? '<div class="result-answer correct-answer">✓ Risposta corretta: ' + r.correctAnswer + '</div>' : '') +
          '</div>';
      });

      const el = document.getElementById('results');
      el.innerHTML = '<div class="results"><div class="results-header">' +
        '<div class="results-score">' + results.score + '/' + results.maxScore + '</div>' +
        '<div class="results-message">' + msg + ' (' + pct + '%)</div></div>' +
        itemsHtml +
        '<div style="text-align:center;"><a class="btn-back" href="/learn">← Torna al Corso</a></div></div>';
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
