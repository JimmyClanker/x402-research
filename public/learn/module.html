<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Module - English B1→C1</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface-2: #242838;
      --border: #2e3348;
      --text: #e2e4eb;
      --text-muted: #8b8fa3;
      --accent: #6c8cff;
      --accent-hover: #8da6ff;
      --success: #4ade80;
      --error: #f87171;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    header {
      background: var(--surface);
      padding: 18px 24px;
      margin-bottom: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .back-btn:hover { background: var(--border); }

    h1 {
      color: #fff;
      font-size: 1.35rem;
      font-weight: 700;
      flex: 1;
      letter-spacing: -0.02em;
    }

    /* ============================
       MOODLE CONTENT OVERRIDES
       Force dark theme on all injected HTML
       ============================ */
    .lesson-content {
      background: var(--surface);
      padding: 32px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    /* Kill all Moodle inline backgrounds & colors */
    .lesson-content *,
    .lesson-content div,
    .lesson-content span,
    .lesson-content p,
    .lesson-content td,
    .lesson-content th,
    .lesson-content li,
    .lesson-content h1,
    .lesson-content h2,
    .lesson-content h3,
    .lesson-content h4,
    .lesson-content h5,
    .lesson-content h6 {
      background-color: transparent !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    /* Moodle wraps stuff in .no-overflow */
    .lesson-content .no-overflow {
      background: transparent !important;
      color: var(--text) !important;
    }

    /* Typography */
    .lesson-content h1, .lesson-content h2 {
      color: #fff !important;
      font-size: 1.5rem;
      font-weight: 700;
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border) !important;
      letter-spacing: -0.02em;
    }

    .lesson-content h3 {
      color: #fff !important;
      font-size: 1.2rem;
      font-weight: 700;
      margin: 24px 0 10px;
      letter-spacing: -0.01em;
    }

    .lesson-content h4 {
      color: var(--accent) !important;
      font-size: 1.05rem;
      font-weight: 600;
      margin: 20px 0 8px;
    }

    .lesson-content p {
      margin-bottom: 14px;
      color: var(--text) !important;
      font-size: 0.95rem;
    }

    .lesson-content ul, .lesson-content ol {
      margin: 8px 0 16px 24px;
      color: var(--text) !important;
    }

    .lesson-content li {
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: var(--text) !important;
    }

    .lesson-content strong, .lesson-content b {
      color: var(--accent) !important;
      font-weight: 600;
    }

    .lesson-content em, .lesson-content i {
      color: var(--text-muted) !important;
      font-style: italic;
    }

    .lesson-content a {
      color: var(--accent) !important;
      text-decoration: underline;
    }

    /* Tables (Moodle uses tables for layout sometimes) */
    .lesson-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
    }

    .lesson-content th {
      background: var(--surface-2) !important;
      color: #fff !important;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border) !important;
    }

    .lesson-content td {
      padding: 10px 14px;
      border: 1px solid var(--border) !important;
      background: transparent !important;
    }

    .lesson-content tr:nth-child(even) td {
      background: rgba(255,255,255,0.02) !important;
    }

    /* Code/pre blocks */
    .lesson-content pre, .lesson-content code {
      background: var(--bg) !important;
      color: var(--accent) !important;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: 'SF Mono', Menlo, monospace;
    }

    .lesson-content pre {
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid var(--border) !important;
    }

    /* Moodle alert/info boxes */
    .lesson-content .alert,
    .lesson-content [class*="alert"],
    .lesson-content [style*="background"] {
      background: var(--surface-2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px;
      padding: 16px !important;
      margin: 12px 0;
    }

    /* Images */
    .lesson-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 12px 0;
    }

    /* Blockquotes */
    .lesson-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      margin: 12px 0;
      background: var(--surface-2) !important;
      border-radius: 0 8px 8px 0;
      font-style: italic;
      color: var(--text-muted) !important;
    }

    /* HR */
    .lesson-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--border); }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .error {
      background: rgba(248,113,113,0.1);
      color: var(--error);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid rgba(248,113,113,0.2);
    }

    @media (max-width: 768px) {
      .lesson-content { padding: 20px 16px; }
      .actions { flex-direction: column; }
      h1 { font-size: 1.15rem; }
      .container { padding: 12px 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="back-btn" href="/learn">←</a>
      <h1 id="moduleTitle">Loading...</h1>
    </header>

    <div id="content">
      <div class="loading">Caricamento lezione...</div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const moduleId = urlParams.get('id');

    if (!moduleId) {
      document.getElementById('content').innerHTML =
        '<div class="error">Nessun modulo specificato</div>';
    } else {
      loadModule();
    }

    async function loadModule() {
      try {
        const res = await fetch('/learn/api/sections');
        if (!res.ok) {
          if (res.status === 401) { window.location.href = '/learn'; return; }
          throw new Error('Failed to load sections');
        }

        const sections = await res.json();
        let foundModule = null;
        let foundSection = null;

        for (const section of sections) {
          for (const module of section.modules) {
            if (module.id === parseInt(moduleId)) {
              foundModule = module;
              foundSection = section;
              break;
            }
          }
          if (foundModule) break;
        }

        if (!foundModule) throw new Error('Module not found');
        renderModule(foundModule, foundSection);
      } catch (err) {
        console.error('Failed to load module:', err);
        document.getElementById('content').innerHTML =
          '<div class="error">Errore nel caricamento del modulo</div>';
      }
    }

    function renderModule(module, section) {
      document.getElementById('moduleTitle').textContent = section.name;
      const contentHtml = module.content_html || '<p>Nessun contenuto disponibile</p>';

      document.getElementById('content').innerHTML = `
        <div class="lesson-content">${contentHtml}</div>
        <div class="actions">
          <a class="btn btn-secondary" href="/learn">← Torna al Corso</a>
          <button class="btn btn-primary" onclick="markComplete()">Completato ✓</button>
        </div>
      `;
    }

    async function markComplete() {
      if (!moduleId) return;
      try {
        const res = await fetch('/learn/api/module/' + moduleId + '/complete', { method: 'POST' });
        if (res.ok) {
          alert('Modulo completato!');
          window.location.href = '/learn';
        }
      } catch (err) { console.error('Failed:', err); }
    }
  </script>
</body>
</html>
