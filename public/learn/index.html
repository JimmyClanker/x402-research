<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English B1→C1 Course</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface-2: #242838;
      --border: #2e3348;
      --text: #e2e4eb;
      --text-muted: #8b8fa3;
      --accent: #6c8cff;
      --accent-hover: #8da6ff;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #f87171;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* === LOGIN === */
    .login-container {
      max-width: 380px;
      margin: 80px auto;
      background: var(--surface);
      padding: 40px 32px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .login-container h2 {
      color: #fff;
      margin-bottom: 6px;
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-login:hover { background: var(--accent-hover); }

    .login-error {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 12px;
      text-align: center;
    }

    /* === HEADER === */
    header {
      background: linear-gradient(135deg, #1c2040 0%, #1a1d2e 100%);
      padding: 28px 24px;
      margin-bottom: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    header h1 {
      color: #fff;
      font-size: 1.6rem;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* === NAV === */
    .nav {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav a:hover { color: #fff; }
    .nav .logout { margin-left: auto; color: var(--error); }

    /* === STATS === */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      padding: 18px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
      letter-spacing: -0.02em;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* === SECTIONS === */
    .section {
      background: var(--surface);
      padding: 20px;
      margin-bottom: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    .section h3 {
      color: #fff;
      margin-bottom: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .modules-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .module-card {
      background: var(--surface-2);
      padding: 14px 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .module-card:hover {
      border-color: var(--accent);
      background: rgba(108,140,255,0.06);
    }

    .module-icon { font-size: 1.6rem; }

    .module-info { flex: 1; min-width: 0; }

    .module-title {
      color: #fff;
      font-weight: 600;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .module-type {
      color: var(--text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-top: 2px;
    }

    .module-status {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .module-score {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      header h1 { font-size: 1.3rem; }
      .stats { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
      .stat-card { padding: 14px 10px; }
      .stat-value { font-size: 1.4rem; }
      .stat-label { font-size: 0.7rem; }
      .nav { font-size: 0.85rem; gap: 14px; }
      .section h3 { font-size: 1rem; }
    }

    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="login-container">
    <h2>English B1→C1</h2>
    <p class="login-subtitle">Corso personalizzato per Alessia</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="alessia" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn-login">Accedi</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>

  <div id="courseContent" style="display: none;">
    <div class="container">
      <header>
        <h1>English B1→C1 Course</h1>
        <p class="subtitle">Bentornata, <span id="studentName"></span>! 🎯</p>
      </header>

      <nav class="nav">
        <a href="/learn">Home</a>
        <a href="/learn/progress.html">Progressi</a>
        <a href="#" class="logout" id="logoutBtn">Esci</a>
      </nav>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="completedModules">0</div>
          <div class="stat-label">Moduli completati</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="attemptedQuizzes">0</div>
          <div class="stat-label">Quiz tentati</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="averageScore">0%</div>
          <div class="stat-label">Media punteggio</div>
        </div>
      </div>

      <div id="sectionsContainer">
        <div class="loading">Caricamento corso...</div>
      </div>
    </div>
  </div>

  <script>
    let isLoggedIn = false;

    async function checkAuth() {
      try {
        const res = await fetch('/learn/api/progress');
        if (res.ok) {
          isLoggedIn = true;
          showCourseContent();
          loadCourseData();
        }
      } catch (err) {}
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      try {
        const res = await fetch('/learn/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        if (res.ok) {
          const result = await res.json();
          isLoggedIn = true;
          document.getElementById('studentName').textContent = result.student.username;
          showCourseContent();
          loadCourseData();
        } else {
          const error = await res.json();
          document.getElementById('loginError').textContent = error.error || 'Login fallito';
        }
      } catch (err) {
        document.getElementById('loginError').textContent = 'Errore di rete';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/learn/logout', { method: 'POST' });
      location.reload();
    });

    function showCourseContent() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('courseContent').style.display = 'block';
    }

    async function loadCourseData() {
      try {
        const [sectionsRes, progressRes] = await Promise.all([
          fetch('/learn/api/sections'),
          fetch('/learn/api/progress'),
        ]);
        if (!sectionsRes.ok || !progressRes.ok) throw new Error('Data load failed');

        const sections = await sectionsRes.json();
        const progress = await progressRes.json();

        document.getElementById('completedModules').textContent = progress.overall.completedModules || 0;
        document.getElementById('attemptedQuizzes').textContent = progress.overall.attemptedQuizzes || 0;
        document.getElementById('averageScore').textContent = Math.round(progress.overall.averageScore || 0) + '%';

        renderSections(sections, progress.quizScores);
      } catch (err) {
        console.error(err);
        document.getElementById('sectionsContainer').innerHTML =
          '<div class="loading" style="color: #f87171;">Errore nel caricamento</div>';
      }
    }

    function renderSections(sections, quizScores) {
      const container = document.getElementById('sectionsContainer');
      container.innerHTML = '';

      for (const section of sections) {
        if (section.modules.length === 0) continue;

        const el = document.createElement('div');
        el.className = 'section';

        const title = document.createElement('h3');
        title.textContent = section.name;
        el.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'modules-grid';

        for (const mod of section.modules) {
          const card = document.createElement('div');
          card.className = 'module-card';

          const icon = document.createElement('div');
          icon.className = 'module-icon';
          icon.textContent = mod.type === 'quiz' ? '📝' : '📖';

          const info = document.createElement('div');
          info.className = 'module-info';

          const titleEl = document.createElement('div');
          titleEl.className = 'module-title';
          titleEl.textContent = mod.name || section.name;

          const typeEl = document.createElement('div');
          typeEl.className = 'module-type';
          typeEl.textContent = mod.type === 'quiz' ? 'Quiz' : 'Lezione';

          info.appendChild(titleEl);
          info.appendChild(typeEl);

          const status = document.createElement('div');
          status.className = 'module-status';

          if (mod.type === 'quiz') {
            const qs = quizScores.find(q => q.quiz_id === mod.moodle_quiz_id);
            if (qs && qs.attempted) {
              status.textContent = qs.percentage >= 70 ? '✅' : '🔄';
              const scoreEl = document.createElement('div');
              scoreEl.className = 'module-score';
              scoreEl.textContent = qs.percentage + '%';
              info.appendChild(scoreEl);
            } else {
              status.textContent = '⭕';
            }
            card.addEventListener('click', () => {
              window.location.href = '/learn/quiz.html?id=' + mod.moodle_quiz_id;
            });
          } else {
            status.textContent = '📄';
            card.addEventListener('click', () => {
              window.location.href = '/learn/module.html?id=' + mod.id;
            });
          }

          card.appendChild(icon);
          card.appendChild(info);
          card.appendChild(status);
          grid.appendChild(card);
        }

        el.appendChild(grid);
        container.appendChild(el);
      }
    }

    checkAuth();
  </script>
</body>
</html>
